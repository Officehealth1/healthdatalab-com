[build]
  publish = "."
  functions = "netlify/functions"


[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://js.stripe.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://*.stripe.com https://api.frankfurter.app; frame-src https://js.stripe.com https://hooks.stripe.com; object-src 'none'; base-uri 'self'"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), interest-cohort=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/backups/*"
  to = "/404.html"
  status = 404

# Security (2026-07-19, verification #5) — publish="." serves the ENTIRE repo
# root, which also contains WordPress plugin source, wp-config.php, the
# .pdfmonkey.env secret, dotfiles and internal .md docs (server IPs, keys,
# architecture). These 404'd at probe time, but only by Netlify default
# behaviour — nothing in the repo guaranteed it. force=true makes the block
# explicit and versioned. NOTE: the stronger fix is to publish a dedicated
# site subdirectory instead of "." — see the runbook; these are belt-and-braces.
[[redirects]]
  from = "/hdl-longevity-v2/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/health-data-lab-plugin/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/wp-config.php"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.pdfmonkey.env"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/netlify/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/scripts/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "https://healthdatalab.netlify.app/*"
  to = "https://healthdatalab.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/personal-report"
  to = "/personal-report.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/help-centre"
  to = "/help-centre.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/course"
  to = "/course.html"
  status = 200

[[edge_functions]]
  function = "geo-currency"
  path = "/"

[[edge_functions]]
  function = "geo-currency"
  path = "/index.html"

[[edge_functions]]
  function = "geo-currency"
  path = "/personal-report"

[[edge_functions]]
  function = "geo-currency"
  path = "/personal-report.html"

[[edge_functions]]
  function = "geo-currency"
  path = "/pricing"

[[edge_functions]]
  function = "geo-currency"
  path = "/pricing.html"
